name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.14"
          enable-cache: true

      # No extras: the agent extra pulls the optional djinn backend from git;
      # the base install must stay standalone.
      - name: Install
        run: uv sync --locked --group dev --no-extra agent

      - name: Lint
        run: uv run ruff check .

      - name: Type-check
        run: uv run pyright app/

      - name: Tests
        run: uv run pytest -q

      - name: Security scan
        run: uv run bandit -c pyproject.toml -r . --severity-level medium

  agent-extra:
    # The optional djinn backend resolves from its public git repository;
    # this job proves the extra keeps installing and the advisor tests pass with it.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Install with the agent extra
        run: uv sync --locked --group dev --extra agent

      - name: Advisor tests
        run: uv run pytest tests/unit/advisor/ -q --no-cov
